### Skytap Configuration File Example ###
## !!! DO NOT EDIT THIS FILE DIRECTLY. COPY to Config.yaml AND EDIT !!! ##

# --- Date Range Settings ---
start_date: "2020-06-13"   # Processing start date (YYYY-MM-DD)
end_date: "2020-06-15"     # Processing end date (YYYY-MM-DD)

# --- Filter Settings ---
months: [5, 6, 7, 8, 9]    # Only process these months (1-12)
run_hours: [17, 18, 19, 20, 21, 22, 23, 0, 1, 2]  # 11am–8pm MDT (UTC-6); all configured months are MDT

# --- HRRR Source Configuration ---
# You usually do not need to change these unless NOAA changes their bucket structure.
hrrr_v1_format: ["00z.hrrra", "06z.hrrra", "12z.hrrra", "18z.hrrra"] # Naming pre 2019-06-12
hrrr_format: ["00-05_hrrr", "06-11_hrrr", "12-17_hrrr", "18-23_hrrr"] # Naming post 2019-06-12
hrrr1_server: "https://noaa-oar-arl-hysplit-pds.s3.amazonaws.com/hrrr.v1"
hrrr_server: "https://noaa-oar-arl-hysplit-pds.s3.amazonaws.com/hrrr"

# --- Directory & File Paths ---
temp_HYSPLIT_config_dir: "Temp_HYSPLIT_Dirs" # Temporary workspace for active HYSPLIT runs
text_file_dir: "txt_files"                   # Directory for internal file lists
full_ARL_file_list: "ARLfilelist.txt"        # Generated master list of all URLs
temp_arl_file_list: "ARL_temp_file_list.txt" # Temporary batch list for current run
state_file: "state.yaml"                     # Tracks pipeline state (e.g. setup completion)

# --- Pipeline Configuration ---
pipeline:
  window_size: 6   # Number of ARL meteorological files to keep on disk simultaneously (Rolling Window)
  window_step: 4   # Number of files to delete/download in each cycle

# --- HYSPLIT Configuration ---
hysplit:
  exec_path: "./hysplit/exec/hyts_std"  # Path to local HYSPLIT executable
  working_dir: "./hysplit"              # HYSPLIT root directory
  met_dir: "./ARL_Files"                # Storage for downloaded meteorological files
  traj_root: "./Trajectory_Files"       # Output directory for trajectory files

  # Model Parameters
  hours_utc: [0, 6, 12, 18] # Daily start hours for trajectories
  step_hours: 24            # Spacing between days
  vert_motion: 0            # Vertical motion method (0=data vertical velocity)
  top_of_model: 15100       # Top of model domain (meters AGL)
  max_workers: 12           # Number of parallel processes (CPU cores) to use

# --- Site Configurations ---
# start_heights is a list — each value launches a separate trajectory per hour per site.
# Use [100] for a single height, or e.g. [5, 100, 500] for multiple heights.
site_hysplit_configs:

